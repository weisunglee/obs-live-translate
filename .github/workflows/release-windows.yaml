name: Release (Windows)

# Push a version tag (e.g. v0.1.0) to build the plugin on a Windows runner and
# attach a ready-to-install zip to a GitHub Release — no local build needed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-x64:
    name: Build & package Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Configure downloads the OBS/prebuilt dependencies declared in
      # buildspec.json, then builds with the same preset used locally.
      - name: Configure
        run: cmake --preset windows-ci-x64

      - name: Build
        run: cmake --build --preset windows-ci-x64

      - name: Package
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $dll = "build_x64/RelWithDebInfo/obs-live-translate.dll"
          if (-not (Test-Path $dll)) { throw "built DLL not found at $dll" }
          $stage = "package"
          New-Item -ItemType Directory -Force -Path "$stage/obs-plugins/64bit" | Out-Null
          Copy-Item $dll "$stage/obs-plugins/64bit/"
          # Bundle a data/ tree only if the plugin ships one (locale, etc.).
          if (Test-Path "data") {
            New-Item -ItemType Directory -Force -Path "$stage/data/obs-plugins/obs-live-translate" | Out-Null
            Copy-Item -Recurse "data/*" "$stage/data/obs-plugins/obs-live-translate/"
          }
          @"
          OBS Live Translate - Windows install

          1. Close OBS Studio.
          2. Copy the 'obs-plugins' (and 'data' if present) folder into your OBS
             Studio install directory, e.g. C:\Program Files\obs-studio\
             (the DLL should end up at obs-plugins\64bit\obs-live-translate.dll).
          3. Start OBS, add the 'Gemini Live Translate' filter to your mic source
             and the 'Gemini Translated Audio' source to your scene.

          Note: the DLL is unsigned, so Windows SmartScreen / antivirus may warn.
          "@ | Set-Content "$stage/INSTALL.txt"
          $zip = "obs-live-translate-$tag-windows-x64.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          "ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME -replace '^v', ''
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$ver" "installer\obs-live-translate.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          $exe = Get-ChildItem "installer/Output/*.exe" | Select-Object -First 1
          if (-not $exe) { throw "installer .exe not produced" }
          "INSTALLER=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$env:GITHUB_REF_NAME" "$env:ZIP" "$env:INSTALLER" --title "$env:GITHUB_REF_NAME" --generate-notes
